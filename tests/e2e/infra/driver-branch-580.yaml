apiVersion: holodeck.nvidia.com/v1alpha1
kind: Environment
metadata:
  name: HOLODECK_NAME
  description: "end-to-end test infrastructure"
spec:
  provider: aws
  auth:
    keyName: cnt-ci
    privateKey: HOLODECK_PRIVATE_KEY
  instance:
    type: g4dn.xlarge
    region: us-west-1
    ingressIpRanges:
    - 18.190.12.32/32
    - 3.143.46.93/32
    - 44.230.241.223/32
    - 44.235.4.62/32
    - 52.15.119.136/32
    - 52.24.205.48/32
    image:
      architecture: amd64
  containerRuntime:
    install: true
    name: docker
  nvidiaContainerToolkit:
    install: false
  nvidiaDriver:
    install: true
    source: package
    package:
      # We pin the version here to allow us to test CUDA Minor Version Compatibility.
      # If we deploy a CUDA 13.0.3+ container (associated with NVIDIA Linux Driver
      # version 580.126.20), NVIDIA Container Toolkit should use the CUDA compat
      # libraries in the container instead of the 580.105.08 libraries on the host.
      version: "580.105.08"
